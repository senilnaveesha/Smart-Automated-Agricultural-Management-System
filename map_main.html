<!DOCTYPE html>
<html>
<head>
    <title>Field Selection</title>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="./libs/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="./libs/leaflet.js"></script>
<script src="./libs/qwebchannel.js"></script>

<script>
console.log("🚀 map_main.html loaded");

window.leafletReady = false;
window.scanMarkers = [];
window.droneMarker = null;
window.pathLine = null;
window.map = null;

let bridge = null;

let points = [];
let markers = [];
let polygon = null;

function initQtBridge() {
    if (typeof QWebChannel === "undefined") {
        console.log("⏳ Waiting for QWebChannel...");
        setTimeout(initQtBridge, 200);
        return;
    }

    if (typeof qt === "undefined") {
        console.log("⚠️ Qt not available");
        return;
    }

    new QWebChannel(qt.webChannelTransport, function(channel) {
        bridge = channel.objects.bridge;
        console.log("✅ WebChannel connected");
    });
}

function initMap() {
    if (typeof L === "undefined") {
        console.log("⏳ Waiting for Leaflet...");
        setTimeout(initMap, 200);
        return;
    }

    console.log("✅ Leaflet ready");

    window.map = L.map("map").setView([6.9271, 79.8612], 15);

    L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
    ).addTo(window.map);

    window.leafletReady = true;

    setupPolygonDrawing();

    setTimeout(() => {
        if (window.map) {
            window.map.invalidateSize();
        }
    }, 150);
}

function setupPolygonDrawing() {
    if (!window.map) return;

    window.map.on("click", function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        points.push([lat, lng]);

        const marker = L.marker([lat, lng]).addTo(window.map);
        markers.push(marker);

        if (polygon) {
            window.map.removeLayer(polygon);
        }

        polygon = L.polygon(points, { color: "green" }).addTo(window.map);

        if (bridge) {
            bridge.receivePolygon(points);
        }
    });
}

function clearField() {
    points = [];

    markers.forEach(m => window.map.removeLayer(m));
    markers = [];

    if (polygon) {
        window.map.removeLayer(polygon);
        polygon = null;
    }

    if (window.pathLine) {
        window.map.removeLayer(window.pathLine);
        window.pathLine = null;
    }

    if (window.droneMarker) {
        window.map.removeLayer(window.droneMarker);
        window.droneMarker = null;
    }

    window.scanMarkers.forEach(m => window.map.removeLayer(m));
    window.scanMarkers = [];

    if (bridge) {
        bridge.receivePolygon(points);
    }

    console.log("🧹 Field cleared");
}

function drawPath(path) {
    if (!window.leafletReady || !window.map || !path || path.length === 0) {
        console.log("⚠️ drawPath skipped");
        return;
    }

    const fixed = path.map(p => [p[0], p[1]]);

    if (window.pathLine) {
        window.map.removeLayer(window.pathLine);
    }

    window.pathLine = L.polyline(fixed, {
        color: "red",
        weight: 2
    }).addTo(window.map);

    window.map.fitBounds(window.pathLine.getBounds());
    console.log("✅ Path drawn");
}

function initDrone(startPoint) {
    if (!window.leafletReady || !window.map) return;

    if (window.droneMarker) {
        window.map.removeLayer(window.droneMarker);
    }

    window.droneMarker = L.marker(startPoint, {
        icon: L.icon({
            iconUrl: "https://cdn-icons-png.flaticon.com/512/149/149995.png",
            iconSize: [25, 25]
        })
    }).addTo(window.map);

    console.log("✅ Drone initialized");
}

function moveDrone(point) {
    if (window.droneMarker) {
        window.droneMarker.setLatLng(point);
    }
}

function drawScanPoints(pointsData) {
    if (!window.leafletReady || !window.map) return;

    pointsData.forEach(p => {
        if (p.lat === undefined || p.lon === undefined) return;

        const color = (p.status === "diseased") ? "red" : "green";

        const marker = L.circleMarker([p.lat, p.lon], {
            radius: 3,
            color: color,
            fillColor: color,
            fillOpacity: 0.8
        }).addTo(window.map);

        window.scanMarkers.push(marker);
    });
}

function updateDronePosition(lat, lon) {
    if (!window.leafletReady) return;

    let point = [lat, lon];

    if (!window.droneMarker) {
        initDrone(point);
        window.map.setView(point, 17);
        return;
    }

    moveDrone(point);

    window.map.panTo(point, {
        animate: true,
        duration: 0.5
    });
}

initQtBridge();
initMap();

window.clearField = clearField;
window.drawPath = drawPath;
window.initDrone = initDrone;
window.moveDrone = moveDrone;
window.drawScanPoints = drawScanPoints;
window.updateDronePosition = updateDronePosition;
</script>

</body>
</html>
