<!DOCTYPE html>
<html>
<head>
    <title>Field Selection</title>
    <meta charset="utf-8" />

    <!-- ✅ LOCAL CSS -->
    <link rel="stylesheet" href="./libs/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- =============================
     🔥 LOCAL LIBRARIES (ORDER CRITICAL)
============================= -->
<script src="./libs/leaflet.js"></script>
<script src="./libs/leaflet-heat.js"></script>
<script src="./libs/qwebchannel.js"></script>

<script>
console.log("🚀 map.html loaded");

// =============================
// 🔥 GLOBAL STATE
// =============================
window.leafletReady = false;
window.scanMarkers = [];
window.heatLayer = null;
window.droneMarker = null;
window.pathLine = null;

let bridge = null;

// =============================
// 🔗 SAFE QT CONNECTION (FIXED)
// =============================
function initQtBridge() {

    if (typeof QWebChannel === "undefined") {
        console.log("⏳ Waiting for QWebChannel...");
        setTimeout(initQtBridge, 200);
        return;
    }

    if (typeof qt === "undefined") {
        console.log("⚠️ Qt not available (OK for heatmap view)");
        return;
    }

    new QWebChannel(qt.webChannelTransport, function(channel) {
        bridge = channel.objects.bridge;
        console.log("✅ WebChannel connected");
    });
}

// =============================
// 🗺️ MAP INIT
// =============================
function initMap() {

    if (typeof L === "undefined") {
        console.log("⏳ Waiting for Leaflet...");
        setTimeout(initMap, 200);
        return;
    }

    console.log("✅ Leaflet ready");

    window.map = L.map('map').setView([6.9271, 79.8612], 15);

    L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
    ).addTo(map);

    window.leafletReady = true;

    setupPolygonDrawing();
}

// =============================
// 🔥 POLYGON DRAWING
// =============================
var points = [];
var markers = [];
var polygon = null;

function setupPolygonDrawing() {

    map.on('click', function(e) {

        let lat = e.latlng.lat;
        let lng = e.latlng.lng;

        points.push([lat, lng]);

        let marker = L.marker([lat, lng]).addTo(map);
        markers.push(marker);

        if (polygon) map.removeLayer(polygon);

        polygon = L.polygon(points, { color: 'green' }).addTo(map);

        if (bridge) bridge.receivePolygon(points);
    });
}

// =============================
// 🧹 CLEAR FIELD
// =============================
function clearField() {

    points = [];

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if (polygon) map.removeLayer(polygon);
    if (window.pathLine) map.removeLayer(window.pathLine);
    if (window.droneMarker) map.removeLayer(window.droneMarker);

    window.scanMarkers.forEach(m => map.removeLayer(m));
    window.scanMarkers = [];

    if (window.heatLayer) {
        map.removeLayer(window.heatLayer);
        window.heatLayer = null;
    }

    if (bridge) bridge.receivePolygon(points);
}

// =============================
// 🚁 DRAW PATH
// =============================
function drawPath(path) {

    if (!window.leafletReady || !path || path.length === 0) return;

    let fixed = path.map(p => [p[0], p[1]]);

    if (window.pathLine) map.removeLayer(window.pathLine);

    window.pathLine = L.polyline(fixed, {
        color: 'red',
        weight: 2
    }).addTo(map);

    map.fitBounds(window.pathLine.getBounds());
}

// =============================
// 🚁 DRONE
// =============================
function initDrone(startPoint) {

    if (!window.leafletReady) return;

    if (window.droneMarker) map.removeLayer(window.droneMarker);

    window.droneMarker = L.marker(startPoint, {
        icon: L.icon({
            iconUrl: "https://cdn-icons-png.flaticon.com/512/149/149995.png",
            iconSize: [25, 25]
        })
    }).addTo(map);
}

function moveDrone(point) {
    if (window.droneMarker) {
        window.droneMarker.setLatLng(point);
    }
}

// =============================
// 🟢 SCAN POINTS
// =============================
function drawScanPoints(points) {

    if (!window.leafletReady) return;

    points.forEach(p => {

        if (p.lat === undefined || p.lon === undefined) return;

        let color = (p.status === "diseased") ? "red" : "green";

        let marker = L.circleMarker([p.lat, p.lon], {
            radius: 3,
            color: color,
            fillColor: color,
            fillOpacity: 0.8
        }).addTo(map);

        window.scanMarkers.push(marker);
    });
}

// =============================
// 🔥 HEATMAP
// =============================
function drawHeatmap(points) {

    function tryRender() {

        if (!window.leafletReady || typeof L === "undefined") {
            console.log("⏳ Waiting for Leaflet in heatmap...");
            setTimeout(tryRender, 200);
            return;
        }

        console.log("🔥 Rendering heatmap:", points.length);

        let heatData = points
            .filter(p => p.lat !== undefined && p.lon !== undefined)
            .map(p => [p.lat, p.lon, p.status === "diseased" ? 1.0 : 0.2]);

        if (heatData.length === 0) return;

        if (window.heatLayer) {
            map.removeLayer(window.heatLayer);
        }

        window.heatLayer = L.heatLayer(heatData, {
            radius: 35,
            blur: 30,
            maxZoom: 17
        }).addTo(map);

        setTimeout(() => {
            map.invalidateSize();
            window.heatLayer.bringToFront();
        }, 100);

        map.fitBounds(L.latLngBounds(heatData.map(p => [p[0], p[1]])));

        console.log("✅ Heatmap rendered");
    }

    tryRender();
}

// =============================
// 🚀 INIT
// =============================
initQtBridge();
initMap();

// =============================
// 🌍 EXPORT
// =============================
window.drawPath = drawPath;
window.clearField = clearField;
window.drawScanPoints = drawScanPoints;
window.initDrone = initDrone;
window.moveDrone = moveDrone;
window.drawHeatmap = drawHeatmap;

</script>

</body>
</html>
